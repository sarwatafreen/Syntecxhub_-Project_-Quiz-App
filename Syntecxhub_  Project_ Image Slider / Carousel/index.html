<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Image Slider | Project 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="slider-card">
    <div class="slider-header">
      <h2>🖼️ Image Carousel</h2>
    </div>
    <div class="slider-body">
      <div class="slider-container">
        <div class="slider-wrapper">
          <div class="slides" id="slidesContainer"></div>
          <button class="slider-btn prev" id="prevSlide">❮</button>
          <button class="slider-btn next" id="nextSlide">❯</button>
        </div>
        <div class="dots" id="dotsContainer"></div>
        <div class="slider-controls">
          <span class="slide-counter" id="slideCounter">1 / 4</span>
          <button id="toggleAutoBtn" class="auto-toggle">⏸ Pause</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
